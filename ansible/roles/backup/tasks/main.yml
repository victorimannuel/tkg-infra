---
# Role: backup — Setup automated daily backup to Google Drive via rclone

- name: Install rclone
  ansible.builtin.shell: |
    curl https://rclone.org/install.sh | sudo bash
  args:
    creates: /usr/bin/rclone

- name: Create rclone config directory for root
  ansible.builtin.file:
    path: /root/.config/rclone
    state: directory
    mode: "0700"

- name: Copy rclone config (gdrive remote)
  ansible.builtin.copy:
    src: rclone.conf
    dest: /root/.config/rclone/rclone.conf
    owner: root
    group: root
    mode: "0600"

- name: Validate gdrive remote exists in rclone config
  ansible.builtin.command: rclone listremotes
  register: rclone_remotes
  changed_when: false

- name: Ensure gdrive remote is configured
  ansible.builtin.assert:
    that:
      - "'gdrive:' in rclone_remotes.stdout_lines"
    fail_msg: "rclone remote 'gdrive:' not found in /root/.config/rclone/rclone.conf"

- name: Template backup script
  ansible.builtin.template:
    src: backup.sh.j2
    dest: /opt/odoo/backup.sh
    owner: root
    group: root
    mode: "0750"

- name: Get available Docker container names
  ansible.builtin.command: docker ps -a --format "{{ '{{.Names}}' }}"
  register: docker_container_names
  changed_when: false

- name: Ensure configured postgres container exists
  ansible.builtin.assert:
    that:
      - "backup_postgres_container in docker_container_names.stdout_lines"
    fail_msg: "Configured postgres container '{{ backup_postgres_container }}' not found."

- name: Get available Docker volume names
  ansible.builtin.command: docker volume ls --format "{{ '{{.Name}}' }}"
  register: docker_volume_names
  changed_when: false

- name: Ensure configured Odoo data volume exists
  ansible.builtin.assert:
    that:
      - "backup_odoo_data_volume in docker_volume_names.stdout_lines"
    fail_msg: "Configured Odoo data volume '{{ backup_odoo_data_volume }}' not found."

- name: Create Google Drive backup base folders
  ansible.builtin.command: >
    rclone mkdir "gdrive:{{ backup_gdrive_folder }}/daily"
  changed_when: false

- name: Create weekly backup folder on Google Drive
  ansible.builtin.command: >
    rclone mkdir "gdrive:{{ backup_gdrive_folder }}/weekly"
  changed_when: false

- name: Setup daily backup cron (2 AM Jakarta time = UTC+7)
  ansible.builtin.cron:
    name: odoo-daily-backup
    hour: "19"    # 19:00 UTC = 02:00 WIB
    minute: "0"
    job: "/opt/odoo/backup.sh >> /var/log/odoo/backup.log 2>&1"
    user: root

- name: Create backup log file
  ansible.builtin.file:
    path: /var/log/odoo/backup.log
    state: touch
    mode: "0644"
    owner: root
    group: root
